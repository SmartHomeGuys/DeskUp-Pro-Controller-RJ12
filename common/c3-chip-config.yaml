# This yaml overrides some parts of the base.yaml (which was for the S3 chip) so a C3 Super Mini chip can be used instead
# Noteable differences are the TX & RX GPIO pin numbers are different. The C3 does not support an RGB Led just a Blue on/off
# Led, which was only used to show if Wi-Fi was connected or not.
substitutions:
  tx_pin: "GPIO5"
  rx_pin: "GPIO6"

packages:
  device_base: !include base.yaml

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Remove BLE configuration to save flash space as we are not using it for Wi-Fi setup on this C3 version
improv_serial: !remove
esp32_improv: !remove

# Replace the RGB led from base.yaml with the C3's single blue status led, keeping the same ID
# so existing references to light_esp32led continue to work.
light:
  - platform: esp32_rmt_led_strip
    id: !remove "light_esp32led"
  - platform: status_led
    id: "light_esp32led"
    name: ESP32 LED
    pin:
      number: GPIO8
      inverted: true
      ignore_strapping_warning: true
    internal: true
    restore_mode: ALWAYS_OFF

# Replace the wifi status interval from base.yaml with one that uses status_led-compatible actions
interval:
  - interval: #5s
    id: !remove "interval_wifi_status"
  - interval: 5s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_off: light_esp32led
          else:
            - light.turn_on: light_esp32led
